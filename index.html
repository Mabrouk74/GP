<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduation Project Presentation</title>
  <meta name="description" content="Official graduation project video presentation.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Decorative Glowing Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="app-container">
    
    <!-- Top Header -->
    <header id="header">
      <a href="#" class="logo" id="siteLogo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
        Jana GP
      </a>
      <div class="badge" id="classBadge">Seniors 2026</div>
    </header>

    <!-- Central Video Showcase Player -->
    <div class="video-wrapper paused" id="videoWrapper">
      <video class="video-element" id="projectVideo" preload="metadata">
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <!-- Big Play Button Overlay -->
      <button class="big-play-btn" id="bigPlayBtn" aria-label="Play Video">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <!-- Custom Video Controls -->
      <div class="player-controls" id="playerControls">
        <!-- Timeline / Progress Bar -->
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Buttons & Slider Controls -->
        <div class="control-row">
          <div class="control-group">
            <!-- Play / Pause -->
            <button class="control-btn play-btn" id="playBtn" aria-label="Play">
              <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <!-- Mute / Volume -->
            <div class="volume-container">
              <button class="control-btn" id="muteBtn" aria-label="Mute">
                <svg id="volumeIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="muteIcon" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" aria-label="Volume Slider">
            </div>

            <!-- Time Counter -->
            <div class="time-display">
              <span id="currentTime">0:00</span> / <span id="durationTime">0:00</span>
            </div>
          </div>

          <div class="control-group">
            <!-- Playback Speed -->
            <div class="speed-dropdown" id="speedDropdown">
              <button class="control-btn speed-btn" id="speedBtn" aria-label="Playback Speed">1.0x</button>
              <ul class="speed-options" id="speedOptions">
                <li data-speed="0.5">0.5x</li>
                <li data-speed="0.75">0.75x</li>
                <li data-speed="1" class="selected">1.0x</li>
                <li data-speed="1.25">1.25x</li>
                <li data-speed="1.5">1.5x</li>
                <li data-speed="2">2.0x</li>
              </ul>
            </div>

            <!-- Full Screen -->
            <button class="control-btn" id="fullscreenBtn" aria-label="Fullscreen">
              <svg id="fullscreenIcon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              <svg id="exitFullscreenIcon" viewBox="0 0 24 24" style="display:none;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
